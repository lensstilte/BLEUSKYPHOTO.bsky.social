name: BleuskyPhoto Bot 08

on:
  schedule:
    - cron: "8 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install atproto

      - name: Run BleuskyPhoto bot
        env:
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME_BLEUSKYPHOTO }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD_BLEUSKYPHOTO }}
          STATE_FILE: state_bleuskyphoto.json
          MAX_PER_RUN: 100
          MAX_PER_USER: 3
          HOURS_BACK: 3
          SLEEP_SECONDS: 2
        run: python bleuskyphoto_reposter.py

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state_bleuskyphoto.json
          git commit -m "Update BleuskyPhoto state" || echo "No changes"
          git push
